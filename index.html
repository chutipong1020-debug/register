<script>
    // ส่วนเชื่อมต่อข้อมูลไปยัง Google Sheets 
    // เปลี่ยน URL ด้านล่างนี้เป็น URL Web App ของคุณที่ Deploy จาก Apps Script เป็นแบบ "Anyone"
    const WEB_APP_URL = "URL_WEB_APP_GOOGLE_APPS_SCRIPT_ของคุุณ";

    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitButton = e.target.querySelector('.btn-submit');
        submitButton.innerText = "กำลังบันทึก...";
        submitButton.disabled = true;

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        // ดึงชื่อ-นามสกุลจากฟอร์มมาเตรียมแสดงผล
        const currentName = data.fullname;

        // จัดรูปแบบ วัน-เวลา สำหรับแสดงผลให้ผู้ใช้เห็นทันทีหลังจากกดปุ่ม
        const now = new Date();
        const optionsDate = { year: 'numeric', month: 'long', day: 'numeric' };
        const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const formattedDate = now.toLocaleDateString('th-TH', optionsDate);
        const formattedTime = now.toLocaleTimeString('th-TH', optionsTime);

        // ส่งข้อมูลไปยัง Google Apps Script
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            // แสดงผลลัพธ์สำเร็จพร้อม วัน เวลา และ ชื่อ-นามสกุล บนหน้าจอ
            alert(
                '🎉 บันทึกข้อมูลสำเร็จเรียบร้อยแล้ว!\n\n' +
                '👤 ผู้ลงทะเบียน: ' + currentName + '\n' +
                '📅 วันที่: ' + formattedDate + '\n' +
                '⏰ เวลา: ' + formattedTime + ' น.'
            );
            document.getElementById('registrationForm').reset();
        })
        .catch(error => {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่อีกครั้ง');
        })
        .finally(() => {
            submitButton.innerText = "บันทึกข้อมูล";
            submitButton.disabled = false;
        });
    });
</script>
